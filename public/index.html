<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workflow Complaint Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- Notifications Panel -->
  <div id="notifications-panel"></div>

  <!-- Header -->
  <header class="glass">
    <div class="logo">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" />
      </svg>
      <h2>Complaint Workflow</h2>
    </div>
    <div class="role-selector">
      <label for="current-role">Role context: </label>
      <select id="current-role">
        <option value="Employee">Employee (Alice)</option>
        <option value="Manager">Manager (Bob)</option>
        <option value="HR">HR (Carol)</option>
      </select>
    </div>
  </header>

  <main>
    <div class="split-view">

      <!-- Left Panel: Lists & Forms -->
      <section class="panel-left">
        <!-- Dashboard Tabs -->
        <div class="tabs">
          <button class="tab-btn active" data-tab="dashboard">Dashboard</button>
          <button class="tab-btn" data-tab="history">All History</button>
          <button class="tab-btn" data-tab="submit" id="tab-submit" style="display:none;">New Complaint</button>
        </div>

        <div class="tab-content active" id="view-dashboard">
          <!-- Dynamic lists based on role -->
          <h3 id="dashboard-title">My Dashboard</h3>
          <div class="complaint-list" id="active-complaints-list"></div>
        </div>

        <div class="tab-content" id="view-history">
          <h3>All Complaints History</h3>
          <div class="complaint-list" id="all-complaints-list"></div>
        </div>

        <div class="tab-content" id="view-submit">
          <h3>Submit a New Complaint</h3>
          <form id="complaint-form" class="glass-card form-layout">
            <input type="text" id="title" placeholder="Complaint Title" required />
            <select id="category" required>
              <option value="Workplace Safety">Workplace Safety</option>
              <option value="Harassment">Harassment</option>
              <option value="Equipment">Equipment Issue</option>
              <option value="Other">Other</option>
            </select>
            <textarea id="description" rows="5" placeholder="Describe the issue in detail..." required></textarea>
            <button type="submit" class="btn primary">Submit Complaint</button>
          </form>
        </div>

      </section>

      <!-- Right Panel: Details & Timeline & Graph -->
      <section class="panel-right glass-card">
        <div id="selection-placeholder" class="placeholder">
          <p>Select a complaint to view details and workflow state.</p>
        </div>

        <div id="complaint-details" style="display: none;">
          <div class="detail-header">
            <h2 id="det-title">Title</h2>
            <span id="det-badge" class="badge">STATE</span>
          </div>
          <p class="det-meta">Submitted by <strong id="det-author">User</strong> on <span id="det-date">-</span></p>

          <div class="det-body" id="det-desc"></div>

          <!-- Actions area visible only for appropriate roles/states -->
          <div class="action-panel" id="action-panel">
            <h4>Available Actions</h4>
            <div id="action-buttons" class="btn-group"></div>
            <div id="reject-note-box" style="display:none; margin-top: 10px;">
              <input type="text" id="action-note" placeholder="Reason (Required for rejection)">
            </div>
          </div>

          <div class="timeline-container">
            <h4>Activity Timeline</h4>
            <ul id="timeline" class="timeline"></ul>
          </div>

          <div class="workflow-graph-container">
            <h4>Live Workflow Diagram</h4>
            <!-- SVG rendered dynamically here -->
            <svg id="workflow-svg" width="100%" height="250"></svg>
          </div>
        </div>
      </section>

    </div>
  </main>

  <script src="app.js"></script>
</body>

</html>
